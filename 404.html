<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#15224F">
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://images.pokemontcg.io" crossorigin>
<title>Page introuvable — leclub151</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CclipPath id='c'%3E%3Ccircle cx='50' cy='50' r='46'/%3E%3C/clipPath%3E%3C/defs%3E%3Cg clip-path='url(%23c)'%3E%3Crect width='100' height='50' fill='%23EE1515'/%3E%3Crect y='50' width='100' height='50' fill='%23fff'/%3E%3Crect y='44' width='100' height='12' fill='%231a1a1a'/%3E%3C/g%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='%231a1a1a' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23fff' stroke='%231a1a1a' stroke-width='6'/%3E%3C/svg%3E">
<style>
  :root { --navy:#15224F; --red:#EE1515; --yellow:#FFCB05; --paper:#F7F2E7; --ink:#1a1a1a; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color:var(--ink);
    background: radial-gradient(circle at 50% 38%, #fffdf8 0%, var(--paper) 70%); text-align:center; }
  .wrap { max-width:520px; }
  .ball { width:96px; height:96px; margin:0 auto 22px; animation: spin 6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: clamp(64px, 16vw, 110px); line-height:1; margin:0; font-weight:800; letter-spacing:-0.04em; color:var(--navy); }
  h2 { font-size: 22px; margin:10px 0 8px; font-weight:800; }
  p { font-size: 15.5px; line-height:1.6; color:#4a4a4a; margin:0 auto 26px; max-width:420px; }
  .btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  a.btn { text-decoration:none; font-weight:600; font-size:15px; padding:13px 22px; border-radius:10px; display:inline-block; }
  .primary { background:var(--red); color:#fff; }
  .outline { border:1.5px solid #d8d2c2; color:var(--ink); }
  a.btn:hover { transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="ball" viewBox="0 0 100 100" aria-hidden="true">
      <defs><clipPath id="c"><circle cx="50" cy="50" r="46"/></clipPath></defs>
      <g clip-path="url(#c)">
        <rect width="100" height="50" fill="#EE1515"/><rect y="50" width="100" height="50" fill="#fff"/>
        <rect y="44" width="100" height="12" fill="#1a1a1a"/>
      </g>
      <circle cx="50" cy="50" r="46" fill="none" stroke="#1a1a1a" stroke-width="6"/>
      <circle cx="50" cy="50" r="14" fill="#fff" stroke="#1a1a1a" stroke-width="6"/>
    </svg>
    <h1>404</h1>
    <h2>Cette carte a disparu du classeur</h2>
    <p>La page que vous cherchez n'existe pas ou a été déplacée. Pas de panique — le reste de la collection vous attend.</p>
    <div class="btns">
      <a class="btn primary" href="index.html">Retour à l'accueil</a>
      <a class="btn outline" href="boutique.html">Voir la boutique</a>
    </div>
  </div>
</body>
</html>
