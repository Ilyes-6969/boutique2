<script type="text/babel">
  function Page() {
    const nav = window.lcNavigate;
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'all';
    const q = params.get('q') || '';
    const game = params.get('game') || 'pokemon';
    return (
      <React.Fragment>
        <a href="#lc-main" className="lc-skip">Aller au contenu principal</a>
        <Announcement />
        <Header navigate={nav} active="catalogue" onCart={() => nav('cart')} />
        <main id="lc-main"><Catalogue navigate={nav} initialFilter={cat} initialQuery={q} initialGame={game} /></main>
        <Footer navigate={nav} />
        <ModalHost />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
