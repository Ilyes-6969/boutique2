<script type="text/babel">
  function Page() {
    const nav = window.lcNavigate;
    // ?id=… (fiche dynamique) ou identifiant injecté par le build (pages
    // statiques /produits/*.html générées pour le référencement).
    const id = new URLSearchParams(window.location.search).get('id') || window.__LC_PRODUCT_ID;
    return (
      <React.Fragment>
        <a href="#lc-main" className="lc-skip">Aller au contenu principal</a>
        <Announcement />
        <Header navigate={nav} active="catalogue" onCart={() => nav('cart')} />
        <main id="lc-main"><Product navigate={nav} productId={id} onCart={() => nav('cart')} /></main>
        <Footer navigate={nav} />
        <ModalHost />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
